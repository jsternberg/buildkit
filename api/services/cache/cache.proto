syntax = "proto3";

package moby.buildkit.v1;

option go_package = "github.com/moby/buildkit/api/services/cache;moby_buildkit_v1";

service CacheManager {
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc Records(RecordsRequest) returns (RecordsResponse);
  rpc Record(RecordRequest) returns (RecordResponse);
}

service BlobStorage {
  rpc Info(BlobInfoRequest) returns (BlobInfoResponse);
  rpc Get(BlobGetRequest) returns (stream BytesMessage);
  rpc Upload(stream BytesMessage) returns (BlobUploadResponse);
  rpc Commit(BlobCommitRequest) returns (BlobCommitResponse);
}

message QueryRequest {
  repeated CacheKeyWithSelector deps = 1;
  string digest = 2;
  int32 input_index = 3;
}

message QueryResponse {
  repeated string cache_keys = 1;
}

message RecordsRequest {
  string id = 1;
}

message RecordsResponse {
  repeated CacheRecord records = 1;
}

message RecordRequest {
  string id = 1;
}

message RecordResponse {
  repeated CacheLayer layers = 1;
}

message GetBlobRequest {
  string digest = 1;
  uint64 offset = 2;
  uint64 limit = 3;
}

message BlobInfoRequest {
  string digest = 1;
}

message BlobInfoResponse {
}

message BlobGetRequest {
}

message BlobUploadResponse {
}

message BlobCommitRequest{
}

message BlobCommitResponse {
}

message BlobUploadRequest {
}

message BlobUploadResponse {
}

message CacheKeyWithSelector {
  string id = 1;
  string selector = 2;
}

message CacheRecord {
  string id = 1;
  int64 created_at = 2;
}

message CacheLayer {
  string blob_digest = 1;
  string parent_blob_digest = 2;
  string media_type = 3;
  string diff_id = 4;
  uint64 size = 5;
  int64 created_at = 6;
}

message BytesMessage {
  repeated bytes data = 1;
}
