syntax = "proto3";

package moby.buildkit.v1.cache;

option go_package = "github.com/moby/buildkit/api/services/cache;moby_buildkit_v1";

service CacheManager {
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc Records(RecordsRequest) returns (RecordsResponse);
  rpc Record(RecordRequest) returns (RecordResponse);
}

service CacheStorage {
  rpc Info(LayerInfoRequest) returns (LayerInfoResponse);
  rpc Get(LayerGetRequest) returns (stream BytesMessage);
  rpc Upload(stream BytesMessage) returns (LayerUploadResponse);
  rpc Commit(LayerCommitRequest) returns (LayerCommitResponse);
}

message QueryRequest {
  repeated CacheKeyWithSelector deps = 1;
  string digest = 2;
  int32 input_index = 3;
}

message QueryResponse {
  repeated string cache_keys = 1;
}

message RecordsRequest {
  string id = 1;
}

message RecordsResponse {
  repeated CacheRecord records = 1;
}

message RecordRequest {
  string id = 1;
}

message RecordResponse {
  repeated CacheLayer layers = 1;
}

message LayerInfoRequest {
  string digest = 1;
}

message LayerInfoResponse {
  CacheLayer layer = 1;
}

message LayerGetRequest {
  string digest = 1;
  uint64 offset = 2;
}

message LayerUploadResponse {
  string id = 1;
  int64 expires_at = 2;
}

message LayerCommitRequest{
  string id = 1;
  string digest = 2;
}

message LayerCommitResponse {
}

message CacheKeyWithSelector {
  string id = 1;
  string selector = 2;
}

message CacheRecord {
  string id = 1;
  int64 created_at = 2;
}

message CacheLayer {
  string blob_digest = 1;
  string parent_blob_digest = 2;
  string media_type = 3;
  string diff_id = 4;
  uint64 size = 5;
  int64 created_at = 6;
}

message BytesMessage {
  repeated bytes data = 1;
}
